{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FF5500">
    <title>{% block title %}GSS CAR Makeovers - Premium Automotive Services{% endblock %}</title>

    <!-- Preload Critical Assets -->
    <link rel="preload" href="{% static 'images/hero_ppf_application.png' %}" as="image" type="image/png">
    <link rel="preload" href="https://fonts.gstatic.com/s/bebasneue/v14/JTUSjIg69CK48gW7PXoo9Wlhyw.woff2" as="font"
        type="font/woff2" crossorigin>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF5500',
                        'primary-hover': '#E64A19',
                        dark: '#000000',
                        'bg-card': '#141414',
                        'text-dim': '#A0A0A0',
                    },
                    fontFamily: {
                        heading: ['Bebas Neue', 'sans-serif'],
                        body: ['Manrope', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>

    <!-- Combined Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Non-render-blocking Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        media="print" onload="this.media='all'" crossorigin="anonymous" referrerpolicy="no-referrer">
    <noscript>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            crossorigin="anonymous" referrerpolicy="no-referrer">
    </noscript>

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" media="print"
        onload="this.media='all'" crossorigin="anonymous" referrerpolicy="no-referrer">
    <noscript>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
            crossorigin="anonymous" referrerpolicy="no-referrer">
    </noscript>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #000000;
            color: #FFFFFF;
        }

        .font-heading {
            font-family: 'Bebas Neue', sans-serif;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>
    {% include 'components/navbar.html' %}

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    {% include 'components/footer.html' %}
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js" defer crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
    <script>
        // Optimized Header scroll effect
        let lastKnownScrollPosition = 0;
        let ticking = false;

        function updateHeader(scrollPos) {
            const header = document.getElementById('main-header');
            if (!header) return;

            if (scrollPos > 50) {
                header.classList.add('bg-black/90', 'backdrop-blur-xl', 'py-4');
                header.classList.remove('py-6');
            } else {
                header.classList.remove('bg-black/90', 'backdrop-blur-xl', 'py-4');
                header.classList.add('py-6');
            }
        }

        window.addEventListener('scroll', () => {
            lastKnownScrollPosition = window.scrollY;

            if (!ticking) {
                window.requestAnimationFrame(() => {
                    updateHeader(lastKnownScrollPosition);
                    ticking = false;
                });

                ticking = true;
            }
        }, { passive: true });
    </script>

    {% block extra_js %}{% endblock %}
</body>

</html>
